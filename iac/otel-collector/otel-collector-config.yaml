extensions:
  health_check:
    endpoint: 0.0.0.0:13133


receivers:
  otlp:
    protocols:
      http:
        endpoint: "[::]:4318"
      grpc:
        endpoint: "[::]:4317"

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  # Temporary: logs a summary line per batch; remove once all backends confirmed working
  debug:
    verbosity: basic

  # Grafana Tempo — basic auth, same endpoint the app sent to directly before
  otlp_http/grafana:
    endpoint: "${GRAFANA_TEMPO_ENDPOINT}"
    headers:
      Authorization: "${GRAFANA_AUTH_HEADER}"

  # Sumo Logic — presigned URL with auth embedded; no separate credentials needed
  # Collector appends /v1/traces, so set base OTLP path only
  otlp_http/sumologic:
    endpoint: "${SUMOLOGIC_OTLP_ENDPOINT}"

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp_http/grafana, otlp_http/sumologic]
